<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" role="img" aria-labelledby="title desc">
  <title id="title">Morel graph benchmark summary</title>
  <desc id="desc">Criterion graph benchmark estimates: step latency pipeline 45.513 nanoseconds, step overhead 10x10 955.55 nanoseconds, branch map node-cycle overhead 9.56 nanoseconds, active operator-cycle overhead 9.19 nanoseconds.</desc>
  <rect width="880" height="360" fill="#fbfbf8"/>
  <text x="40" y="48" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#202124">Graph internals</text>
  <text x="40" y="76" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#5f6368">Criterion steady-state estimates for warmed Morel graphs</text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="40" y="110" width="385" height="82" rx="8" fill="#eef6f4" stroke="#c8dfda"/>
    <text x="64" y="140" font-size="13" font-weight="700" fill="#2f6f6d">Step latency</text>
    <text x="64" y="171" font-size="30" font-weight="700" fill="#202124">45.513 ns</text>
    <text x="232" y="171" font-size="14" fill="#5f6368">per Graph::step</text>

    <rect x="455" y="110" width="385" height="82" rx="8" fill="#f1effa" stroke="#d8d1f0"/>
    <text x="479" y="140" font-size="13" font-weight="700" fill="#6f5cc2">10x10 step overhead</text>
    <text x="479" y="171" font-size="30" font-weight="700" fill="#202124">955.55 ns</text>
    <text x="668" y="171" font-size="14" fill="#5f6368">per Graph::step</text>

    <rect x="40" y="220" width="385" height="82" rx="8" fill="#f8f1ee" stroke="#e5cec4"/>
    <text x="64" y="250" font-size="13" font-weight="700" fill="#c55a3d">Branch map node-cycle</text>
    <text x="64" y="281" font-size="30" font-weight="700" fill="#202124">9.56 ns</text>
    <text x="184" y="281" font-size="14" fill="#5f6368">955.55 ns / 100 branch maps</text>

    <rect x="455" y="220" width="385" height="82" rx="8" fill="#eef2fb" stroke="#cbd7ef"/>
    <text x="479" y="250" font-size="13" font-weight="700" fill="#3d73c5">Active operator-cycle</text>
    <text x="479" y="281" font-size="30" font-weight="700" fill="#202124">9.19 ns</text>
    <text x="599" y="281" font-size="14" fill="#5f6368">955.55 ns / 104 operators</text>
  </g>
</svg>
